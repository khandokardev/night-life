  # ── Bookings ──────────────────────────────────────────────────────────────────
  /admin/bookings:
    get:
      operationId: listAllBookings
      tags: [bookings]
      summary: List all bookings (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Booking list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /admin/bookings/{id}:
    patch:
      operationId: updateBookingStatus
      tags: [bookings]
      summary: Approve / cancel booking
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  # ── Reviews ──────────────────────────────────────────────────────────────────
  /admin/reviews:
    get:
      operationId: listAllReviews
      tags: [reviews]
      summary: List all reviews (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Review list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

  /admin/reviews/{id}:
